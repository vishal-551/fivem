<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CineDirector</title><link rel="stylesheet" href="app.css"></head><body><main id="app" aria-label="CineDirector workspace"><header><strong>CINE<span>DIRECTOR</span></strong><input id="project" aria-label="Project name" value="Untitled Scene"><div class="actions"><button data-action="undo">↶</button><button data-action="redo">↷</button><button data-action="save" class="accent">Save</button><button data-action="close">×</button></div></header><section class="workspace"><aside class="panel"><h2>Library</h2><input id="search" placeholder="Search everywhere…" aria-label="Search library"><nav><button class="tab active" data-tab="entities">Scene</button><button class="tab" data-tab="spawn">Spawn</button><button class="tab" data-tab="animation">Animation</button><button class="tab" data-tab="weather">Weather</button></nav><div id="content"></div></aside><section class="canvas"><div class="empty"><b>Director canvas</b><small>Use Freecam to frame the shot · WASD to move · Shift to accelerate</small><button data-action="camera" class="accent">Toggle Freecam</button></div></section><aside class="panel inspector"><h2>Inspector</h2><p>Select an item in Scene to manage it.</p><button data-action="load">Load project</button></aside></section><footer><span>Ctrl+S save</span><span>Ctrl+Z undo</span><span>Esc close</span><span id="status">Ready</span></footer></main><script src="app.js"></script></body></html>
